    <link rel="preload" href="./font/mona-sans.ttf" as="font" crossorigin />
    <link rel="preload" href="./mark.svg" as="image" />
    <style>
      @font-face {
        font-family: "Mona Sans";
        src: url("./font/mona-sans.ttf") format("truetype");
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: #111111;
        color: #ffffff;
        font-family: "Mona Sans", sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      #scene {
        position: fixed;
        inset: 0;
        z-index: 0;
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
        padding-bottom: 10vh;
      }

      .hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5rem;
      }

      .logo-img,
      .wordmark {
        width: auto;
        display: block;
        filter: brightness(0) invert(1);
      }

      .logo-img {
        height: 36px;
      }

      .wordmark {
        position: absolute;
        bottom: 5.5rem;
        left: 50%;
        transform: translateX(-50%);
        height: clamp(2.5rem, 4vw, 3.5rem);
        opacity: 0.9;
      }

      .coming-soon {
        font-weight: 600;
        font-size: clamp(1.5rem, 2.5vw, 2.25rem);
        letter-spacing: 0.45em;
        color: rgba(255, 255, 255, 0.9);
        white-space: nowrap;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div
      style="width: 100vw; height: 100vh"
      data-us-project="zT5RYGcxQRVAQXVfZfBN"
      data-us-production="true"
      id="scene"
    ></div>

    <div class="overlay">
      <div class="hero">
        <img src="./mark.svg" alt="Cortex Global mark" class="logo-img" />
        <p class="coming-soon">Coming Soon</p>
      </div>
      <img src="./wordmark.svg" alt="Cortex Global" class="wordmark" />
    </div>

    <script type="text/javascript">
      !(function () {
        var u = window.UnicornStudio;
        if (u && u.init) {
          if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", function () {
              u.init();
            });
          } else {
            u.init();
          }
        } else {
          window.UnicornStudio = { isInitialized: !1 };
          var i = document.createElement("script");
          ((i.src =
            "https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.1.12/dist/unicornStudio.umd.js"),
            (i.onload = function () {
              if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", function () {
                  UnicornStudio.init();
                });
              } else {
                UnicornStudio.init();
              }
            }),
            (document.head || document.body).appendChild(i));
        }
      })();
    </script>
  </body>
</html>
